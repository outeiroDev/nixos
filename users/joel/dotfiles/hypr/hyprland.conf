plugin {
  hyprexpo {
    columns = 2
    gap_size = 5
    bg_col = rgb(000000)
    skip_empty = true
    enable_gesture = true
    workspace_method = center 1
    gesture_fingers = 3
    gesture_distance = 300
    gesture_positive = true
  }
  split-monitor-workspaces{
    count = 4
  }
}
